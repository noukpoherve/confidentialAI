# ══════════════════════════════════════════════════════════════════════════════
# BUILD BROWSER EXTENSION
#
# This workflow:
#   1. Runs Vitest unit tests
#   2. Builds the extension for Chrome, Firefox, and Edge
#   3. Packages each build as a .zip ready for store submission
#   4. Attaches the zips as GitHub artifacts
#
# HOW TO DOWNLOAD ARTIFACTS:
#   GitHub → your repo → Actions → this workflow run → Summary → Artifacts
# ══════════════════════════════════════════════════════════════════════════════

name: Build Browser Extension

on:
  push:
    branches: [main]
    paths:
      - "apps/browser-extension/**"
      - ".github/workflows/build-extension.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/browser-extension/**"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release with the artifacts?"
        type: boolean
        default: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB : Build all extensions in parallel using a matrix strategy
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: "Build Extension (${{ matrix.browser }})"
    runs-on: ubuntu-latest

    # Matrix: this job runs 3 times in parallel, once per browser
    strategy:
      matrix:
        browser: [chrome, firefox, edge]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/browser-extension/package-lock.json

      - name: Install dependencies
        working-directory: apps/browser-extension
        run: npm ci

      # Run tests only once (not 3 times for the same matrix)
      - name: Run tests
        if: matrix.browser == 'chrome'
        working-directory: apps/browser-extension
        run: npm test -- --run

      - name: Build CSS (Tailwind)
        working-directory: apps/browser-extension
        run: npm run build:css

      - name: Build extension for ${{ matrix.browser }}
        working-directory: apps/browser-extension
        run: npm run build:extensions:${{ matrix.browser }}

      - name: Package extension as zip
        working-directory: apps/browser-extension
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ZIP_NAME="confidential-agent-extension-${{ matrix.browser }}-v${VERSION}.zip"

          cd dist/${{ matrix.browser }}
          zip -r "../../${ZIP_NAME}" .
          cd ../..

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      # Store the zip as a GitHub artifact (available for 30 days)
      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-${{ matrix.browser }}
          path: apps/browser-extension/confidential-agent-extension-${{ matrix.browser }}-*.zip
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # OPTIONAL JOB : Create a GitHub Release with all zips
  # Only runs when triggered manually with create_release = true
  # ────────────────────────────────────────────────────────────────────────────
  create-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download all artifacts from previous jobs
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/browser-extension/package.json').version")
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      # Create a draft GitHub Release with the zips attached
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: extension-${{ steps.version.outputs.version }}
          name: "Browser Extension ${{ steps.version.outputs.version }}"
          draft: true   # Review before publishing
          files: artifacts/**/*.zip
          body: |
            ## Browser Extension ${{ steps.version.outputs.version }}

            ### Manual installation
            - **Chrome / Edge**: `chrome://extensions` → Developer mode → Load unpacked
            - **Firefox**: `about:debugging` → This Firefox → Load Temporary Add-on
