# ══════════════════════════════════════════════════════════════════════════════
# DEPLOY API → Koyeb
#
# This workflow:
#   1. Builds a Docker image for the API
#   2. Pushes it to GitHub Container Registry (GHCR) — free with GitHub
#   3. Triggers a redeployment on Koyeb
#
# REQUIRED SECRETS (GitHub → Settings → Secrets and variables → Actions):
#   - KOYEB_API_KEY      : your Koyeb API key (Koyeb → Account → API keys)
#   - KOYEB_SERVICE_ID   : your service ID in Koyeb
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy API to Koyeb

on:
  push:
    branches: [main]
    paths:
      # Only trigger when these files change
      - "services/security-api/**"
      - ".github/workflows/deploy-api.yml"
  # Allow manual trigger from the GitHub UI
  workflow_dispatch:

# Permission to push images to GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 : Build and push Docker image
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: "Build Docker Image"
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # GITHUB_TOKEN is automatic — no manual setup required
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags automatically
      # e.g. ghcr.io/org/repo/security-api:main
      #      ghcr.io/org/repo/security-api:sha-abc1234
      - name: Generate Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/security-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Enable BuildKit for faster multi-stage builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/security-api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reuse layers from previous builds to speed things up
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 : Deploy to Koyeb
  # Waits for the build job to complete
  # ────────────────────────────────────────────────────────────────────────────
  deploy-to-koyeb:
    name: "Deploy to Koyeb"
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to Koyeb via API
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/security-api:latest"
          echo "Deploying image: $IMAGE"

          RESPONSE=$(curl -s -o /tmp/koyeb_response.json -w "%{http_code}" \
            -X POST "https://app.koyeb.com/v1/services/${{ secrets.KOYEB_SERVICE_ID }}/redeploy" \
            -H "Authorization: Bearer ${{ secrets.KOYEB_API_KEY }}" \
            -H "Content-Type: application/json")

          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "Koyeb deployment triggered successfully (HTTP $RESPONSE)"
          else
            echo "Koyeb deployment failed (HTTP $RESPONSE)"
            cat /tmp/koyeb_response.json
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "## API Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ghcr.io/${{ github.repository }}/security-api:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
