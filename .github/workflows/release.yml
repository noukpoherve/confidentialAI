# ══════════════════════════════════════════════════════════════════════════════
# RELEASE WORKFLOW
#
# Triggered when a release branch is merged into main OR when a version tag
# is pushed (e.g. git tag v0.2.0 && git push origin v0.2.0).
#
# What it does:
#   1. Runs all tests (safety gate)
#   2. Builds the browser extension for all browsers (production)
#   3. Creates a GitHub Release with:
#      - Auto-generated release notes (from PR titles / commit messages)
#      - Extension .zip artifacts attached
#
# HOW TO TRIGGER A RELEASE:
#   Option A (recommended): push a version tag
#     git tag v0.2.0 -m "Release v0.2.0"
#     git push origin v0.2.0
#
#   Option B: create release/vX.Y.Z branch → merge into main
#     The tag is created automatically by the release branch merge.
# ══════════════════════════════════════════════════════════════════════════════

name: Release

on:
  # Trigger on version tags: v1.0.0, v0.2.1, etc.
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 : Run all tests before releasing (never release broken code)
  # ────────────────────────────────────────────────────────────────────────────
  test-before-release:
    name: "Tests (pre-release gate)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/browser-extension/package-lock.json

      - name: Install extension dependencies
        working-directory: apps/browser-extension
        run: npm ci

      - name: Run extension tests
        working-directory: apps/browser-extension
        run: npm test -- --run

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 : Build extension for all browsers (production)
  # ────────────────────────────────────────────────────────────────────────────
  build-extension:
    name: "Build Extension (${{ matrix.browser }})"
    runs-on: ubuntu-latest
    needs: test-before-release

    strategy:
      matrix:
        browser: [chrome, firefox, edge]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/browser-extension/package-lock.json

      - name: Install dependencies
        working-directory: apps/browser-extension
        run: npm ci

      - name: Build extension for ${{ matrix.browser }} (production)
        working-directory: apps/browser-extension
        run: npm run build:extensions:${{ matrix.browser }}

      - name: Package as zip
        working-directory: apps/browser-extension
        run: |
          # Use the git tag as the version in the zip filename
          VERSION="${{ github.ref_name }}"
          ZIP_NAME="confidential-agent-extension-${{ matrix.browser }}-${VERSION}.zip"
          cd dist/${{ matrix.browser }}
          zip -r "../../${ZIP_NAME}" .
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-${{ matrix.browser }}
          path: apps/browser-extension/confidential-agent-extension-${{ matrix.browser }}-*.zip

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 : Create the GitHub Release
  # ────────────────────────────────────────────────────────────────────────────
  create-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: build-extension

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for release notes

      - name: Download all extension artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # GitHub auto-generates release notes from merged PRs and commits
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          generate_release_notes: true   # auto-fill from PR titles
          files: artifacts/**/*.zip
