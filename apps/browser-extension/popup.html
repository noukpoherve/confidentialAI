<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title data-i18n-title="opt_brand">Confidential Agent</title>
    <link rel="stylesheet" href="tailwind.output.css" />
    <style>
      @keyframes orb-pulse {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50%       { opacity: 0;   transform: scale(1.55); }
      }
      .animate-orb-pulse { animation: orb-pulse 2.5s ease-in-out infinite; }
    </style>
  </head>

  <body class="w-[300px] bg-slate-900 text-slate-100 font-sans antialiased select-none">

    <!-- Header -->
    <div class="flex items-center gap-2.5 px-3.5 py-3 border-b border-slate-800">
      <div class="w-8 h-8 rounded-[8px] overflow-hidden bg-white flex items-center justify-center shadow-md ring-1 ring-white/15 shrink-0">
        <img src="icons/icon-128.png" alt="" width="32" height="32" class="w-full h-full object-contain" />
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-[12.5px] font-bold tracking-tight" data-i18n="opt_brand">Confidential Agent</div>
        <div class="text-[9px] text-slate-500 uppercase tracking-wider mt-0.5 font-semibold" data-i18n="pop_subtitle">AI Privacy Guardrail</div>
      </div>
      <label class="relative w-8 h-[18px] cursor-pointer shrink-0" data-i18n-title="pop_toggle_title">
        <input type="checkbox" id="quickToggle" checked class="sr-only peer" />
        <span class="absolute inset-0 bg-slate-700 rounded-full transition-colors duration-200 peer-checked:bg-indigo-600"></span>
        <span class="absolute top-[3px] left-[3px] w-3 h-3 bg-slate-400 rounded-full shadow transition-all duration-200 peer-checked:translate-x-[14px] peer-checked:bg-white"></span>
      </label>
    </div>

    <!-- Paused banner -->
    <div id="disabledBanner" class="hidden mx-3.5 mt-2 px-3 py-2 bg-amber-500/15 border border-amber-500/30 rounded-lg text-[11px] text-amber-400 font-medium text-center" data-i18n="pop_paused">
      Guardrail paused — prompts unprotected
    </div>

    <!-- API Status -->
    <div class="flex items-center gap-3 px-3.5 py-3.5 border-b border-slate-800">
      <div class="relative w-10 h-10 shrink-0">
        <div id="orbInner" class="w-10 h-10 rounded-full bg-indigo-500/15 flex items-center justify-center transition-colors duration-300">
          <svg id="orbIcon" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4M12 16h.01"/>
          </svg>
        </div>
        <div id="orbRing" class="hidden absolute inset-[-3px] rounded-full border-[1.5px] border-emerald-500 animate-orb-pulse"></div>
      </div>
      <div class="flex-1 min-w-0">
        <div id="statusLabel" class="text-[13px] font-bold text-indigo-400">…</div>
        <div id="statusSub" class="text-[10.5px] text-slate-500 mt-0.5 truncate">…</div>
      </div>
    </div>

    <!-- Platform row -->
    <div class="flex items-center gap-2 px-3.5 py-2.5 bg-slate-800/40 border-b border-slate-800">
      <div id="platformDot" class="w-[7px] h-[7px] rounded-full bg-slate-600 shrink-0 transition-all duration-300"></div>
      <span id="platformName" class="flex-1 text-[12px] font-semibold truncate" data-i18n="pop_no_platform">No AI platform detected</span>
      <span id="platformBadge" class="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-slate-700 text-slate-500 shrink-0 transition-all duration-300">—</span>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 border-b border-slate-800">
      <div class="px-3.5 py-3 bg-slate-800/30 border-r border-slate-800">
        <div id="statAnalyzed" class="text-[22px] font-extrabold tracking-tight leading-none">—</div>
        <div class="text-[9px] text-slate-500 uppercase tracking-widest mt-1 font-semibold" data-i18n="pop_stat_analyzed">Analyzed</div>
      </div>
      <div class="px-3.5 py-3 bg-slate-800/30">
        <div id="statBlocked" class="text-[22px] font-extrabold tracking-tight leading-none text-red-400">—</div>
        <div class="text-[9px] text-slate-500 uppercase tracking-widest mt-1 font-semibold" data-i18n="pop_stat_blocked">Blocked</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-between px-3.5 py-2.5">
      <a href="options.html" target="_blank" class="flex items-center gap-1.5 text-[11.5px] text-slate-500 hover:text-indigo-400 transition-colors no-underline">
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span data-i18n="pop_settings">Settings</span>
      </a>
      <span class="text-[9px] text-slate-700 font-medium tracking-wide">v0.1.0</span>
    </div>

    <script src="src/i18n.js"></script>
    <script src="src/siteConfigs.js"></script>
    <script src="src/popup.js"></script>
  </body>
</html>
