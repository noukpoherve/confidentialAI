services:
  mongo:
    image: mongo:7
    container_name: confidential-agent-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: confidential_agent
    volumes:
      - mongo_data:/data/db
      - ../mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: confidential-agent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mongo_data:
  qdrant_data:
